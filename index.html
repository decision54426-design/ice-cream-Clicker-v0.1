<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スーパー・アイスクリッカー</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
            margin: 0; padding: 20px;
            overflow-x: hidden; position: relative;
            min-height: 100vh; color: #333;
        }
        h1 { color: #ff4500; }
        .status-box {
            background: rgba(255, 255, 255, 0.8);
            padding: 15px; border-radius: 15px;
            display: inline-block; margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .coin-highlight {
            font-size: 32px; color: #ff69b4; font-weight: bold;
        }
        #ice-cream {
            font-size: 140px; cursor: pointer;
            user-select: none; transition: transform 0.05s;
            display: inline-block; margin: 10px;
        }
        #ice-cream:active { transform: scale(0.85) rotate(-5deg); }
        .click-pop {
            position: absolute; font-weight: bold;
            font-size: 28px; color: #ff4500;
            text-shadow: 2px 2px 0px #fff;
            pointer-events: none; z-index: 200;
            animation: floatUp 0.8s ease-out forwards;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-120px); }
        }
        .golden-ice {
            position: absolute; font-size: 60px;
            cursor: pointer; z-index: 100;
            animation: goldenSpin 1.5s linear infinite;
        }
        @keyframes goldenSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .container {
            display: flex; justify-content: center;
            gap: 25px; flex-wrap: wrap; margin-top: 30px;
        }
        .panel {
            background: white; padding: 20px;
            width: 340px; border-radius: 16px;
        }
        .shop-item, .achievement-item {
            background: #f9f9f9; border-radius: 8px;
            padding: 12px; margin: 12px 0;
            display: flex; justify-content: space-between;
            align-items: center; text-align: left;
        }
        .achievement-item { opacity: 0.5; background: #eaeaea; }
        .achievement-item.unlocked {
            opacity: 1; border: 2px solid #00bcd4;
            background: linear-gradient(135deg, #e0f7fa, #b2ebf2);
        }
        button {
            padding: 8px 16px; color: white; border: none;
            background: #ff69b4; border-radius: 20px;
            cursor: pointer; font-weight: bold;
        }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .system-btn { background: #708090; font-size: 12px; }
    </style>
</head>
<body>

    <h1>| スーパー・アイスクリッカー |</h1>
    <div class="status-box">
        <div>所持コイン: <span id="coin-count" class="coin-highlight">0</span></div>
        <div style="font-size: 14px;">
            毎秒 (CPS): <span id="cps-count">0</span> | 
            クリック力: <span id="power-count">1</span>
        </div>
    </div>
    <br>
    <div id="ice-cream">|</div>
    <div>
        <button class="system-btn" onclick="saveGame()">| 手動セーブ</button>
        <button class="system-btn" style="background:#cd5c5c" onclick="resetGame()">| 初期化</button>
    </div>
    <div class="container">
        <div class="panel">
            <h3>| ショップ</h3>
            <div class="shop-item">
                <div>
                    <div>🍫 チョコトッピング</div>
                    <div style="font-size:12px;color:#888">価格: <span id="item1-cost">15</span></div>
                </div>
                <button id="buy-item1" onclick="buyItem1()">購入</button>
            </div>
            <div class="shop-item">
                <div>
                    <div>🤖 自動アイス製造機</div>
                    <div style="font-size:12px;color:#888">価格: <span id="item2-cost">100</span></div>
                </div>
                <button id="buy-item2" onclick="buyItem2()">購入</button>
            </div>
        </div>
        <div class="panel">
            <h3>| 実績 (解除でクリック2倍)</h3>
            <div id="ach1" class="achievement-item">
                <div>🔰 ビギナー (100枚)</div>
                <span id="ach1-status">未達成</span>
            </div>
            <div id="ach2" class="achievement-item">
                <div>🏭 大量生産 (自動5台)</div>
                <span id="ach2-status">未達成</span>
            </div>
        </div>
    </div>

    <script>
        let gameData = {
            coins: 0, baseClickPower: 1, cps: 0,
            item1Cost: 15, item2Cost: 100, item2Count: 0,
            ach1Unlocked: false, ach2Unlocked: false
        };
        function getClickPower() {
            let mult = 1;
            if (gameData.ach1Unlocked) mult *= 2;
            if (gameData.ach2Unlocked) mult *= 2;
            return gameData.baseClickPower * mult;
        }
        function updateDisplay() {
            document.getElementById('coin-count').innerText = Math.floor(gameData.coins);
            document.getElementById('cps-count').innerText = gameData.cps;
            document.getElementById('power-count').innerText = getClickPower();
            document.getElementById('item1-cost').innerText = gameData.item1Cost;
            document.getElementById('item2-cost').innerText = gameData.item2Cost;
            document.getElementById('buy-item1').disabled = gameData.coins < gameData.item1Cost;
            document.getElementById('buy-item2').disabled = gameData.coins < gameData.item2Cost;
            if (gameData.ach1Unlocked) {
                document.getElementById('ach1').classList.add('unlocked');
                document.getElementById('ach1-status').innerText = '🎉!';
            }
            if (gameData.ach2Unlocked) {
                document.getElementById('ach2').classList.add('unlocked');
                document.getElementById('ach2-status').innerText = '🎉!';
            }
        }
        function createPopEffect(x, y, text) {
            const pop = document.createElement('div');
            pop.className = 'click-pop'; pop.innerText = text;
            pop.style.left = `${x}px`; pop.style.top = `${y}px`;
            document.body.appendChild(pop);
            setTimeout(() => pop.remove(), 800);
        }
        document.getElementById('ice-cream').addEventListener('click', (e) => {
            const p = getClickPower(); gameData.coins += p;
            createPopEffect(e.pageX, e.pageY, `+${p}`);
            checkAchievements(); updateDisplay();
        });
        function buyItem1() {
            if (gameData.coins >= gameData.item1Cost) {
                gameData.coins -= gameData.item1Cost;
                gameData.baseClickPower += 1;
                gameData.item1Cost = Math.ceil(gameData.item1Cost * 1.15);
                updateDisplay();
            }
        }
        function buyItem2() {
            if (gameData.coins >= gameData.item2Cost) {
                gameData.coins -= gameData.item2Cost;
                gameData.cps += 1; gameData.item2Count += 1;
                gameData.item2Cost = Math.ceil(gameData.item2Cost * 1.15);
                checkAchievements(); updateDisplay();
            }
        }
        function checkAchievements() {
            if (!gameData.ach1Unlocked && gameData.coins >= 100) gameData.ach1Unlocked = true;
            if (!gameData.ach2Unlocked && gameData.item2Count >= 5) gameData.ach2Unlocked = true;
        }
        function spawnGoldenIce() {
            const g = document.createElement('div');
            g.className = 'golden-ice'; g.innerText = '✨|✨';
            g.style.left = Math.random() * (window.innerWidth - 100) + 'px';
            g.style.top = Math.random() * (window.innerHeight - 100) + 'px';
            g.addEventListener('click', (e) => {
                const b = Math.max(50, Math.floor(gameData.coins * 0.15));
                gameData.coins += b;
                createPopEffect(e.pageX, e.pageY, `👑 BONUS +${b} 👑`);
                g.remove(); updateDisplay();
            });
            document.body.appendChild(g);
            setTimeout(() => { if(g) g.remove(); }, 8000);
        }
        setInterval(() => { if (Math.random() > 0.4) spawnGoldenIce(); }, 12000);
        setInterval(() => {
            if (gameData.cps > 0) { gameData.coins += gameData.cps; checkAchievements(); updateDisplay(); }
        }, 1000);
        setInterval(saveGame, 10000);
        function saveGame() { localStorage.setItem('iceClickerSingle', JSON.stringify(gameData)); }
        function loadGame() {
            const s = localStorage.getItem('iceClickerSingle');
            if (s) { gameData = JSON.parse(s); updateDisplay(); }
        }
        function resetGame() {
            if (confirm('リセットしますか？')) { localStorage.removeItem('iceClickerSingle'); location.reload(); }
        }
        loadGame(); updateDisplay();
    </script>
</body>
</html>
