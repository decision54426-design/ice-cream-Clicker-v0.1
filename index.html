<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
 content="width=device-width, initial-scale=1.0">
<title>無限アイスクリッカー</title>
<style>
  body {
    font-family: sans-serif;
    text-align: center;
    background: linear-gradient(
      135deg, #f5f7fa, #c3cfe2
    );
    margin: 0; padding: 15px;
    overflow-x: hidden;
    min-height: 100vh;
    color: #333;
  }
  h1 { font-size: 24px; color: #ff4500; }
  
  .status-box {
    background: rgba(255,255,255,0.9);
    padding: 12px; border-radius: 12px;
    margin: 0 auto 15px auto;
    max-width: 320px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
  }
  .coin-highlight {
    font-size: 30px; color: #ff69b4;
    font-weight: bold;
  }
  
  #ice-cream {
    font-size: 110px; cursor: pointer;
    user-select: none; margin: 5px;
    transition: transform 0.05s;
    display: inline-block;
  }
  #ice-cream:active {
    transform: scale(0.85) rotate(-5deg);
  }
  
  .click-pop {
    position: absolute; font-weight: bold;
    font-size: 24px; color: #ff4500;
    text-shadow: 2px 2px 0px #fff;
    pointer-events: none; z-index: 200;
    animation: floatUp 0.8s ease-out forwards;
  }
  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-100px); }
  }
  
  .golden-ice {
    position: absolute; font-size: 50px;
    cursor: pointer; z-index: 100;
    animation: goldenSpin 1.5s linear infinite;
  }
  @keyframes goldenSpin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  
  .container {
    margin: 15px auto 0 auto;
    max-width: 320px;
  }
  .panel {
    background: white; padding: 15px;
    border-radius: 16px; margin-bottom: 20px;
  }
  .panel h3 { color: #ff69b4; margin-top: 0; }
  
  .shop-item, .achievement-item {
    background: #f9f9f9; border-radius: 8px;
    padding: 12px; margin: 10px 0;
    text-align: center;
  }
  .item-name {
    font-weight: bold; font-size: 16px;
  }
  .item-details {
    font-size: 13px; color: #666; margin: 5px 0;
  }
  
  .achievement-item {
    opacity: 0.4; background: #eaeaea;
  }
  .achievement-item.unlocked {
    opacity: 1; border: 2px solid #00bcd4;
    background: linear-gradient(
      135deg, #e0f7fa, #b2ebf2
    );
  }
  
  button {
    padding: 10px 20px; color: white;
    border: none; background: #ff69b4;
    border-radius: 20px; cursor: pointer;
    font-weight: bold; width: 100%;
    max-width: 180px;
  }
  button:disabled {
    background: #ccc; cursor: not-allowed;
  }
  .system-btn {
    background: #708090; font-size: 11px;
    padding: 6px 12px; width: auto; margin: 3px;
  }
</style>
</head>
<body>

  <h1>無限アイスクリッカー</h1>
  
  <div class="status-box">
    <div>所持: <span id="coin-count"
      class="coin-highlight">0</span></div>
    <div style="font-size: 13px; margin-top: 4px;">
      毎秒: <span id="cps-count">0</span> |
      クリック: <span id="power-count">1</span>
    </div>
    <div style="font-size: 11px; color: #666;"
      id="prestige-info">
      転生: 0回 (ボーナス: +0%)
    </div>
  </div>

  <!-- ここがメインの動くアイスになります -->
  <div id="ice-cream">🍦</div>
  
  <div>
    <button class="system-btn"
      onclick="saveGame()">💾 セーブ</button>
    <button class="system-btn"
      style="background:#cd5c5c"
      onclick="resetGame()">🗑️ 初期化</button>
    <button class="system-btn"
      style="background:#daa520; display:block;
      margin:8px auto; width:200px;"
      id="prestige-btn"
      onclick="prestigeGame()">
      ✨ 転生 (必要: 100k)
    </button>
  </div>
  
  <div class="container">
    <div class="panel">
      <h3>🛒 ショップ</h3>
      
      <div class="shop-item">
        <div class="item-name">🍫 チョコ</div>
        <div class="item-details">
          価格: <span id="item1-cost">15</span><br>
          (クリック力 +1)
        </div>
        <button id="buy-item1"
          onclick="buyItem1()">購入</button>
      </div>
      
      <div class="shop-item">
        <div class="item-name">🤖 自動製造機</div>
        <div class="item-details">
          価格: <span id="item2-cost">100</span><br>
          (毎秒自動 +1)
        </div>
        <button id="buy-item2"
          onclick="buyItem2()">購入</button>
      </div>
      
      <div class="shop-item">
        <div class="item-name">🏪 専門店</div>
        <div class="item-details">
          価格: <span id="item3-cost">1.1k</span><br>
          (毎秒自動 +15)
        </div>
        <button id="buy-item3"
          onclick="buyItem3()">購入</button>
      </div>
      
      <div class="shop-item">
        <div class="item-name">🚀 宇宙工場</div>
        <div class="item-details">
          価格: <span id="item4-cost">12k</span><br>
          (毎秒自動 +250)
        </div>
        <button id="buy-item4"
          onclick="buyItem4()">購入</button>
      </div>
    </div>
    
    <div class="panel">
      <h3>🏆 実績 (倍率UP)</h3>
      <div id="ach1" class="achievement-item">
        <div class="item-name">🔰 新米</div>
        <div class="item-details">100枚達成</div>
        <span id="ach1-status">未達成</span>
      </div>
      <div id="ach2" class="achievement-item">
        <div class="item-name">🏭 工場長</div>
        <div class="item-details">自動機5台</div>
        <span id="ach2-status">未達成</span>
      </div>
      <div id="ach3" class="achievement-item">
        <div class="item-name">💰 富豪</div>
        <div class="item-details">10k枚達成</div>
        <span id="ach3-status">未達成</span>
      </div>
      <div id="ach4" class="achievement-item">
        <div class="item-name">🏢 大企業</div>
        <div class="item-details">専門店5軒</div>
        <span id="ach4-status">未達成</span>
      </div>
      <div id="ach5" class="achievement-item">
        <div class="item-name">🌌 覇者</div>
        <div class="item-details">宇宙5基</div>
        <span id="ach5-status">未達成</span>
      </div>
    </div>
  </div>

  <!-- ここで下の仕組み（script.js）を呼び出します -->
  <script src="script.js"></script>
</body>
</html>
